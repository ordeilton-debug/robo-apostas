atualizar # .github/workflows/robo.yml
name: Rodar Robo de Value Bets

on:
  schedule:
    - cron: '*/2 * * * *'  # Roda a cada 2 minutos
  workflow_dispatch:        # Permite rodar manualmente pelo site do GitHub quando quiser

jobs:
  executar-robo:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install requests python-dotenv

    - name: Executar o robo
      run: |
        python robo_unico.py
