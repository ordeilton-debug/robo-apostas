name: Executar Robo de Apostas

on:
  schedule:
    # Roda automaticamente a cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite rodar manualmente no botão do site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Executar o Robô
        run: python robo_master.py